<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rental Debug - INSIDE:LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #070A12; --bg-secondary: #0E1220; --accent: #73f7b7;
      --text-primary: #F4F6FF; --text-secondary: #A6A9B6; --border: rgba(244,246,255,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    #root { min-height: 100vh; }
    .rental-app { min-height: 100vh; background: var(--bg-primary); color: var(--text-primary); }
    .app-header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 2rem 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .app-header h1 { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 1rem 0; justify-content: center; }
    .filters button {
      background: transparent; border: 1px solid rgba(244,246,255,0.2); color: var(--text-secondary);
      padding: 0.5rem 1rem; border-radius: 999px; cursor: pointer; transition: all 0.3s; font-size: 0.875rem;
    }
    .filters button:hover { border-color: var(--accent); color: var(--accent); }
    .filters button.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); font-weight: 600; }
    .catalog { padding: 2rem 0 4rem; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .product-card {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: all 0.3s ease; cursor: pointer;
    }
    .product-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(115,247,183,0.15); }
    .product-image { aspect-ratio: 1; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .product-card:hover .product-image img { transform: scale(1.05); }
    .product-overlay {
      position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,10,18,0.9), transparent);
      display: flex; align-items: flex-end; padding: 1rem; opacity: 0; transition: opacity 0.3s;
    }
    .product-card:hover .product-overlay { opacity: 1; }
    .view-details { color: var(--accent); font-size: 0.875rem; font-weight: 500; }
    .product-info { padding: 1rem; }
    .product-info h3 { font-family: 'Sora', sans-serif; font-size: 1.125rem; font-weight: 600; margin: 0 0 0.25rem; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px);
    }
    .modal-content { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem; width: 32px; height: 32px;
      background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: var(--text-primary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: all 0.3s; font-size: 1.5rem;
    }
    .modal-close:hover { background: var(--accent); color: var(--bg-primary); }
    .modal-gallery { position: relative; }
    .gallery-main { aspect-ratio: 16/9; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .gallery-main img { width: 100%; height: 100%; object-fit: contain; }
    .gallery-thumbs { display: flex; gap: 0.5rem; padding: 1rem; overflow-x: auto; }
    .gallery-thumb { width: 80px; height: 60px; background: var(--bg-primary); border: 2px solid transparent; border-radius: 8px; overflow: hidden; cursor: pointer; flex-shrink: 0; opacity: 0.5; transition: all 0.3s; }
    .gallery-thumb.active, .gallery-thumb:hover { border-color: var(--accent); opacity: 1; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-controls { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 0.5rem; pointer-events: none; }
    .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
      color: var(--text-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s; z-index: 5; font-size: 1.5rem; pointer-events: all;
    }
    .gallery-nav:hover { background: var(--accent); color: var(--bg-primary); }
    .gallery-prev { left: 1rem; }
    .gallery-next { right: 1rem; }
    .modal-info { padding: 1.5rem; }
    .modal-info h2 { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 700; margin: 0 0 0.5rem; }
    .product-desc { color: var(--text-secondary); line-height: 1.6; margin: 1rem 0; }
    .product-specs h3 { font-size: 0.875rem; color: var(--accent); text-transform: uppercase; margin: 0 0 1rem; }
    .product-specs ul { list-style: none; margin: 0; padding: 0; }
    .product-specs li {
      display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem;
      font-size: 0.875rem; color: var(--text-secondary);
    }
    .product-specs li::before {
      content: ''; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin-top: 0.5rem; flex-shrink: 0;
    }
    .modal-actions { display: flex; gap: 1rem; padding: 1.5rem; border-top: 1px solid var(--border); margin-top: 1.5rem; }
    .btn-primary, .btn-secondary { flex: 1; padding: 0.875rem 1.5rem; border-radius: 8px; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s; border: none; }
    .btn-primary { background: var(--accent); color: var(--bg-primary); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .app-footer { background: var(--bg-secondary); padding: 2rem 0; text-align: center; border-top: 1px solid var(--border); }
    .app-footer p { color: var(--text-secondary); font-size: 0.875rem; }
    @media (max-width: 640px) {
      .container { padding: 0 0.75rem; }
      .product-grid { grid-template-columns: 1fr; gap: 1rem; }
      .modal-content { border-radius: 12px; margin: 1rem; }
      .modal-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Debug: Test simple de que el root existe -->
  <script>
    console.log('=== RENTAL PAGE DEBUG ===');
    console.log('root element:', document.getElementById('root'));
  </script>

  <!-- React desde CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Catálogo de productos -->
  <script src="../rental-catalog.js"></script>

  <!-- Aplicación Rental -->
  <script src="../rental-app.js"></script>

  <!-- Debug final -->
  <script>
    console.log('React available:', typeof React !== 'undefined');
    console.log('ReactDOM available:', typeof ReactDOM !== 'undefined');
    console.log('Ur catalog:', typeof Ur !== 'undefined' ? `Loaded with ${Ur.length} products` : 'NOT FOUND');
    console.log('Pr details:', typeof Pr !== 'undefined' ? 'Loaded' : 'NOT FOUND');
  </script>
</body>
</html>
